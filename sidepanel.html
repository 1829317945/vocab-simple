<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生词本</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #34c759;
  --green-dk:   #28a745;
  --green-bg:   #f0fdf4;
  --green-tag:  #dcfce7;
  --green-tag-t:#15803d;
  --surface:    #ffffff;
  --bg:         #f5f5f7;
  --border:     #e4e4e7;
  --border2:    #d4d4d8;
  --text:       #18181b;
  --text2:      #52525b;
  --text3:      #a1a1aa;
  --red:        #ef4444;
  --red-bg:     #fef2f2;
  --shadow:     0 1px 4px rgba(0,0,0,.08);
}

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP FORM ── */
.form-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 14px 14px;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.brand-dot {
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.brand-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -.3px;
}

.brand-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: .2px;
}

/* inputs */
.row { display: flex; gap: 8px; margin-bottom: 8px; }

.inp {
  flex: 1;
  height: 38px;
  padding: 0 11px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
  min-width: 0;
}
.inp:focus {
  border-color: var(--green);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(52,199,89,.13);
}
.inp::placeholder { color: var(--text3); }

/* pos buttons */
.pos-section { margin-bottom: 10px; }

.pos-heading {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: var(--text3);
  margin-bottom: 7px;
}

.pos-group {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.pos-btn {
  height: 26px;
  padding: 0 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  color: var(--text2);
  font-size: 11.5px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
  line-height: 1;
}
.pos-btn:hover { border-color: var(--green); color: var(--green-dk); }
.pos-btn.on {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
  font-weight: 600;
}

/* add button */
.add-btn {
  width: 100%;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: var(--green);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: -.1px;
  transition: opacity .15s, transform .1s;
  box-shadow: 0 2px 8px rgba(52,199,89,.35);
}
.add-btn:hover { opacity: .88; }
.add-btn:active { transform: scale(.98); }

/* ── SEARCH ── */
.search-bar {
  padding: 9px 14px 5px;
  flex-shrink: 0;
  background: var(--bg);
}

.search-wrap {
  position: relative;
}
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
  display: flex;
}
.search-inp {
  width: 100%;
  height: 34px;
  padding: 0 10px 0 32px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.search-inp:focus { border-color: var(--green); }
.search-inp::placeholder { color: var(--text3); }

/* ── WORD LIST ── */
.list-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px 20px;
}
.list-scroll::-webkit-scrollbar { width: 3px; }
.list-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.empty-state {
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  padding: 40px 0 0;
  line-height: 2;
}

/* word card */
.card {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  background: var(--surface);
  border-radius: 11px;
  padding: 11px 12px;
  margin-bottom: 7px;
  box-shadow: var(--shadow);
  animation: slideIn .18s ease;
  border: 1px solid transparent;
  transition: border-color .15s;
}
.card:hover { border-color: var(--border); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: none; }
}

.card-num {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  width: 16px;
  text-align: right;
  padding-top: 3px;
  flex-shrink: 0;
  letter-spacing: .2px;
}

.card-body { flex: 1; min-width: 0; }

.card-top {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 3px;
}

.card-word {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.2px;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 5px;
  background: var(--green-tag);
  color: var(--green-tag-t);
  letter-spacing: .2px;
}

.card-trans {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.45;
}

.card-ex {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
  margin-top: 5px;
  line-height: 1.45;
  padding-left: 8px;
  border-left: 2px solid var(--border);
}

.del-btn {
  width: 24px; height: 24px;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  padding: 0;
  transition: background .12s, color .12s;
  margin-top: 1px;
}
.del-btn:hover { background: var(--red-bg); color: var(--red); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: #fff;
  font-size: 12.5px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err  { background: var(--red); }
</style>
</head>
<body>

<!-- Form -->
<div class="form-panel">
  <div class="brand">
    <div class="brand-dot">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2.5" y="3"   width="11" height="1.7" rx=".85" fill="white"/>
        <rect x="2.5" y="7"   width="7.5" height="1.7" rx=".85" fill="rgba(255,255,255,.75)"/>
        <rect x="2.5" y="11"  width="9"   height="1.7" rx=".85" fill="rgba(255,255,255,.75)"/>
      </svg>
    </div>
    <span class="brand-name">生词本</span>
    <span class="brand-count" id="count-badge">0 词</span>
  </div>

  <div class="row">
    <input class="inp" id="inp-word"  placeholder="生词" autocomplete="off" spellcheck="false" />
    <input class="inp" id="inp-trans" placeholder="翻译" autocomplete="off" />
  </div>
  <div class="row">
    <input class="inp" id="inp-ex" placeholder="例句（选填）" autocomplete="off" />
  </div>

  <div class="pos-section">
    <div class="pos-heading">词性（选填，可多选）</div>
    <div class="pos-group" id="pos-group">
      <button class="pos-btn" type="button" data-v="n.">名词 n.</button>
      <button class="pos-btn" type="button" data-v="v.">动词 v.</button>
      <button class="pos-btn" type="button" data-v="adj.">形容词 adj.</button>
      <button class="pos-btn" type="button" data-v="adv.">副词 adv.</button>
      <button class="pos-btn" type="button" data-v="prep.">介词 prep.</button>
      <button class="pos-btn" type="button" data-v="phr.">短语 phr.</button>
      <button class="pos-btn" type="button" data-v="conj.">连词 conj.</button>
    </div>
  </div>

  <button class="add-btn" id="add-btn" type="button">＋ 添加</button>
</div>

<!-- Search -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="5.8" cy="5.8" r="4" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8.8 8.8L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </span>
    <input class="search-inp" id="search-inp" placeholder="搜索..." />
  </div>
</div>

<!-- List -->
<div class="list-scroll" id="word-list"></div>

<div id="toast"></div>

<script src="sidepanel.js"></script>
</body>
</html>
